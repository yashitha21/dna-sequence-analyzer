<script type="text/babel" data-presets="react">

const {

/* ============================================================
   HORSPOOL ALGORITHM IMPLEMENTATION
   ============================================================ */

// Build shift table (bad character table)
function buildShiftTable(pattern) {
  const m = pattern.length;
  const table = {};
  // For each char in pattern except the last
  for (let i = 0; i < m - 1; i++) {
    table[pattern[i]] = m - 1 - i;
  }
  return table;
}

// Returns array of match positions + full step-by-step trace
function horspoolSearch(text, pattern) {
  const n = text.length, m = pattern.length;
  const matches = [];
  const steps = [];
  let comparisons = 0;
  let shifts = 0;
  let skippedComparisons = 0;

  if (m === 0 || m > n) {
    return { matches, steps, comparisons: 0, shifts: 0, skippedComparisons: 0, shiftTable: {}, executionTime: 0 };
  }

  const shiftTable = buildShiftTable(pattern);
  const t0 = performance.now();

  let i = m - 1; // index in text aligning with last char of pattern
  while (i < n) {
    let k = 0; // number of matched characters from right
    // Compare from right to left
    const stepComparisons = [];
    while (k < m && pattern[m - 1 - k] === text[i - k]) {
      comparisons++;
      stepComparisons.push({ textIdx: i - k, patternIdx: m - 1 - k, matched: true });
      k++;
    }
    if (k < m) {
      // mismatch at text[i - k] vs pattern[m - 1 - k]
      comparisons++;
      stepComparisons.push({ textIdx: i - k, patternIdx: m - 1 - k, matched: false });
    }

    const alignmentStart = i - m + 1;
    const fullMatch = k === m;
    if (fullMatch) {
      matches.push(alignmentStart);
    }

    // Determine shift
    const badChar = text[i]; // char in text aligned with last position of pattern
    const shift = shiftTable[badChar] !== undefined ? shiftTable[badChar] : m;
    // Skipped comparisons (theoretical) = shift - 1, only when shift > 1
    if (shift > 1) skippedComparisons += (shift - 1);

    steps.push({
      alignmentStart,
      patternAligned: pattern,
      comparisons: stepComparisons,
      fullMatch,
      shift,
      badChar,
      textIndex: i,
    });

    i += shift;
    shifts++;
  }

  const executionTime = performance.now() - t0;
  return { matches, steps, comparisons, shifts, skippedComparisons, shiftTable, executionTime };
}

// Naive string matching for comparison
function naiveSearch(text, pattern) {
  const n = text.length, m = pattern.length;
  const matches = [];
  let comparisons = 0;
  const t0 = performance.now();
  for (let i = 0; i <= n - m; i++) {
    let j = 0;
    while (j < m) {
      comparisons++;
      if (text[i + j] !== pattern[j]) break;
      j++;
    }
    if (j === m) matches.push(i);
  }
  return { matches, comparisons, executionTime: performance.now() - t0 };
}

// Mutation detection - aligns positions, finds substitutions
function detectMutations(original, mutated) {
  const len = Math.min(original.length, mutated.length);
  const mutations = [];
  for (let i = 0; i < len; i++) {
    if (original[i] !== mutated[i]) {
      mutations.push({ position: i, from: original[i], to: mutated[i] });
    }
  }
  const lengthDiff = Math.abs(original.length - mutated.length);
  const totalLen = Math.max(original.length, mutated.length);
  const similarity = totalLen === 0 ? 100 : ((totalLen - mutations.length - lengthDiff) / totalLen) * 100;
  return { mutations, similarity, lengthDiff, comparedLength: len };
}

const ParticleField = () => {
  const particles = useMemo(() => Array.from({ length: 40 }, (_, i) => ({

const AnimatedDNA = ({ size = 200 }) => {
  const [t, setT] = useState(0);
  useEffect(() => {
    let id = requestAnimationFrame(function loop() {
      setT(prev => prev + 0.02);
      id = requestAnimationFrame(loop);
    });
    return () => cancelAnimationFrame(id);
  }, []);
  const bases = ['A', 'T', 'G', 'C'];
  const colors = { A: '#34d399', T: '#f87171', G: '#facc15', C: '#60a5fa' };
  const rungs = 14;
  return (
    <svg viewBox="0 0 200 400" width={size} height={size * 2} className="drop-shadow-[0_0_30px_rgba(6,182,212,0.4)]">
      <defs>
        <linearGradient id="strand1" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="#06B6D4" />
          <stop offset="100%" stopColor="#8B5CF6" />
        </linearGradient>
        <linearGradient id="strand2" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="#8B5CF6" />
          <stop offset="100%" stopColor="#06B6D4" />
        </linearGradient>
      </defs>
      {Array.from({ length: rungs }).map((_, i) => {
        const y = (i / (rungs - 1)) * 380 + 10;
        const phase = i * 0.5 + t;
        const x1 = 100 + Math.sin(phase) * 50;
        const x2 = 100 - Math.sin(phase) * 50;
        const base1 = bases[i % 4];
        const base2 = { A: 'T', T: 'A', G: 'C', C: 'G' }[base1];
        const zFront = Math.sin(phase) > 0;
        return (
          <g key={i}>
            <line x1={x1} y1={y} x2={x2} y2={y}
              stroke={zFront ? 'rgba(148,163,184,0.4)' : 'rgba(148,163,184,0.15)'}
              strokeWidth="1.5" strokeDasharray="2 3" />
            <circle cx={x1} cy={y} r="6" fill={colors[base1]} opacity={zFront ? 1 : 0.5} />
            <circle cx={x2} cy={y} r="6" fill={colors[base2]} opacity={zFront ? 0.5 : 1} />
          </g>
        );
      })}
      {/* Strand curves */}
      <path d={(() => {
        let d = '';
        for (let i = 0; i <= 100; i++) {
          const y = (i / 100) * 380 + 10;
          const x = 100 + Math.sin(i * 0.1 + t) * 50;
          d += (i === 0 ? 'M' : 'L') + x + ' ' + y + ' ';
        }
        return d;
      })()} stroke="url(#strand1)" strokeWidth="3" fill="none" />
      <path d={(() => {
        let d = '';
        for (let i = 0; i <= 100; i++) {
          const y = (i / 100) * 380 + 10;
          const x = 100 - Math.sin(i * 0.1 + t) * 50;
          d += (i === 0 ? 'M' : 'L') + x + ' ' + y + ' ';
        }
        return d;
      })()} stroke="url(#strand2)" strokeWidth="3" fill="none" />
    </svg>
  );
};

          <SectionTitle eyebrow="The Algorithm" title="Horspool — The Smarter Search" subtitle="A 1980 simplification of Boyer-Moore that skips comparisons using a single bad-character table."/>
          <div className="grid lg:grid-cols-2 gap-8 items-center">
            <div className="glass p-6 rounded-2xl font-mono text-xs sm:text-sm overflow-x-auto">

              <pre className="text-slate-200">{`function horspool(text, pattern) {
  const m = pattern.length, n = text.length;
  const table = buildShiftTable(pattern);
  let i = m - 1;
  while (i < n) {
    let k = 0;
    while (k < m && pattern[m-1-k] === text[i-k]) k++;
    if (k === m) return i - m + 1; // match!
    i += table[text[i]] ?? m;       // skip
  }
}`}</pre>

const VisualizationPage = () => {
  const [dna, setDna] = useState('ATGCGTAGCTAGCTAGC');
  const [pattern, setPattern] = useState('TAGC');
  const [stepIdx, setStepIdx] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(800);

  const analysis = useMemo(() => horspoolSearch(dna, pattern), [dna, pattern]);

  useEffect(() => {
    if (!playing) return;
    if (stepIdx >= analysis.steps.length - 1) { setPlaying(false); return; }
    const id = setTimeout(() => setStepIdx(s => s + 1), speed);
    return () => clearTimeout(id);
  }, [playing, stepIdx, speed, analysis.steps.length]);

  useEffect(() => { setStepIdx(0); setPlaying(false); }, [dna, pattern]);

  const step = analysis.steps[stepIdx];
  const completedAlignments = analysis.steps.slice(0, stepIdx + 1).filter(s => s.fullMatch).map(s => s.alignmentStart);

  // Build comparison state for visualization
  const compMap = {};
  if (step) {
    step.comparisons.forEach(c => {
      compMap[c.textIdx] = c.matched ? 'match' : 'mismatch';
    });
    // Mark "current" as the last comparison
    const last = step.comparisons[step.comparisons.length - 1];
    if (last) compMap[last.textIdx] = (compMap[last.textIdx] === 'match' && step.fullMatch) ? 'match' : compMap[last.textIdx];
  }

  return (
    <div className="pt-28 pb-20 min-h-screen relative bg-grid">
      <div className="absolute top-40 right-20 w-96 h-96 bg-purple-500/10 blur-[100px] rounded-full"/>
      <div className="relative max-w-7xl mx-auto px-4 sm:px-6">
        <SectionTitle eyebrow="Step-by-Step" title="Horspool Visualizer" subtitle="Watch the pattern slide along the text, with right-to-left comparisons, mismatches, and smart shifts."/>

        {/* Controls */}
        <div className="glass p-5 rounded-2xl mb-6 grid md:grid-cols-2 gap-4">
          <DNAInput label="Text (DNA)" value={dna} onChange={setDna} rows={2}/>
          <DNAInput label="Pattern" value={pattern} onChange={setPattern} rows={2}/>
        </div>

        <div className="glass p-5 rounded-2xl mb-6 flex flex-wrap items-center gap-4">
          <button onClick={() => setPlaying(!playing)}
            className="btn-primary px-5 py-2.5 rounded-lg font-semibold text-sm">
            {playing ? '❚❚ Pause' : '▶ Play'}
          </button>
          <button onClick={() => setStepIdx(Math.max(0, stepIdx - 1))} disabled={stepIdx === 0}
            className="px-4 py-2.5 rounded-lg border border-slate-700 text-sm disabled:opacity-40">◀ Prev</button>
          <button onClick={() => setStepIdx(Math.min(analysis.steps.length - 1, stepIdx + 1))} disabled={stepIdx >= analysis.steps.length - 1}
            className="px-4 py-2.5 rounded-lg border border-slate-700 text-sm disabled:opacity-40">Next ▶</button>
          <button onClick={() => { setStepIdx(0); setPlaying(false); }} className="px-4 py-2.5 rounded-lg border border-slate-700 text-sm">⟲ Reset</button>
          <div className="flex items-center gap-2 ml-auto">
            <span className="text-xs text-slate-500 uppercase tracking-widest">Speed</span>
            <input type="range" min="200" max="2000" step="100" value={2200 - speed} onChange={e => setSpeed(2200 - parseInt(e.target.value))} className="accent-cyan-500"/>
          </div>
          <div className="font-mono text-sm text-cyan-400">
            Step {stepIdx + 1} / {analysis.steps.length}
          </div>
        </div>

        {/* The visualizer */}
        <div className="glass p-6 rounded-2xl mb-6 overflow-x-auto">
          {step ? (
            <div className="min-w-max">
              {/* Index ruler */}
              <div className="flex mb-1 text-[10px] text-slate-600 font-mono">
                {dna.split('').map((_, i) => (
                  <div key={i} className="w-[40px] sm:w-[40px] text-center" style={{width: 40}}>{i}</div>
                ))}
              </div>

              {/* Text row */}
              <div className="flex mb-6">
                {dna.split('').map((c, i) => {
                  const state = compMap[i];
                  const inWindow = i >= step.alignmentStart && i < step.alignmentStart + pattern.length;
                  const isFound = completedAlignments.some(start => i >= start && i < start + pattern.length);
                  let cls = `base-cell base-${c}`;
                  if (state === 'match') cls += ' match';
                  else if (state === 'mismatch') cls += ' mismatch';
                  else if (isFound && !inWindow) cls += ' found';
                  else if (!inWindow && i < step.alignmentStart) cls += ' skipped';
                  return (
                    <div key={i} className={cls} style={{width: 40}}>
                      {c}
                    </div>
                  );
                })}
              </div>

              {/* Pattern row aligned */}
              <div className="flex" style={{ marginLeft: step.alignmentStart * 40 }}>
                {pattern.split('').map((c, i) => {
                  const textIdx = step.alignmentStart + i;
                  const state = compMap[textIdx];
                  let cls = `base-cell base-${c}`;
                  if (state === 'match') cls += ' match';
                  else if (state === 'mismatch') cls += ' mismatch';
                  return (
                    <div key={i} className={cls} style={{width: 40}}>
                      {c}
                    </div>
                  );
                })}
              </div>

              {/* Shift arrow */}
              <div className="flex items-center gap-3 mt-6 text-sm">
                <div className="px-3 py-1.5 rounded-full bg-yellow-400/10 border border-yellow-400/30 text-yellow-300 font-mono">
                  shift = {step.shift}
                </div>
                {step.fullMatch && (
                  <div className="px-3 py-1.5 rounded-full bg-emerald-400/10 border border-emerald-400/30 text-emerald-300 font-mono">
                    ✓ MATCH at index {step.alignmentStart}
                  </div>
                )}
                <div className="text-xs text-slate-500">
                  Bad char: <span className="font-mono text-slate-300">{step.badChar}</span> →
                  table lookup = <span className="font-mono text-cyan-400">{step.shift}</span>
                </div>
              </div>
            </div>
          ) : (
            <div className="text-slate-400 text-center py-8">Enter a DNA sequence and pattern to begin visualization</div>
          )}
        </div>

        {/* Legend */}
        <div className="glass p-4 rounded-2xl flex flex-wrap gap-4 text-sm mb-6">
          <div className="flex items-center gap-2"><div className="base-cell match" style={{width:24, height:24}}></div> Matched</div>
          <div className="flex items-center gap-2"><div className="base-cell mismatch" style={{width:24, height:24}}></div> Mismatch</div>
          <div className="flex items-center gap-2"><div className="base-cell current" style={{width:24, height:24}}></div> Current</div>
          <div className="flex items-center gap-2"><div className="base-cell found" style={{width:24, height:24}}></div> Already Matched</div>
          <div className="flex items-center gap-2"><div className="base-cell skipped" style={{width:24, height:24}}>A</div> Skipped Region</div>
        </div>

        {/* Shift table side panel */}
        <div className="grid lg:grid-cols-2 gap-6">
          <div className="glass p-6 rounded-2xl">
            <h3 className="font-semibold mb-3">Shift Table for "{pattern}"</h3>
            <div className="grid grid-cols-4 gap-2">
              {['A','T','G','C'].map(c => {
                const val = analysis.shiftTable[c] !== undefined ? analysis.shiftTable[c] : pattern.length;
                return (
                  <div key={c} className="bg-slate-950/60 rounded-lg p-3 text-center border border-slate-800/50">
                    <div className={`font-mono font-bold text-2xl base-${c}`}>{c}</div>
                    <div className="font-mono text-lg text-slate-200">{val}</div>
                  </div>
                );
              })}
            </div>
            <p className="text-xs text-slate-500 mt-4 leading-relaxed">
              Each value tells us how far to slide the pattern when that character is aligned with the pattern's last position and a mismatch occurs.
            </p>
          </div>

          <div className="glass p-6 rounded-2xl">
            <h3 className="font-semibold mb-3">Summary</h3>
            <div className="space-y-2 text-sm">
              <div className="flex justify-between"><span className="text-slate-400">Pattern</span><span className="font-mono text-cyan-400">{pattern}</span></div>
              <div className="flex justify-between"><span className="text-slate-400">Text length</span><span className="font-mono">{dna.length}</span></div>
              <div className="flex justify-between"><span className="text-slate-400">Matches found</span><span className="font-mono text-purple-400">{analysis.matches.length}</span></div>
              <div className="flex justify-between"><span className="text-slate-400">Total comparisons</span><span className="font-mono">{analysis.comparisons}</span></div>
              <div className="flex justify-between"><span className="text-slate-400">Pattern shifts</span><span className="font-mono">{analysis.shifts}</span></div>
              <div className="flex justify-between"><span className="text-slate-400">Skipped (theoretical)</span><span className="font-mono">{analysis.skippedComparisons}</span></div>
              <div className="flex justify-between"><span className="text-slate-400">Execution time</span><span className="font-mono text-emerald-400">{analysis.executionTime.toFixed(3)} ms</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

      <div className="font-mono text-sm overflow-x-auto">
        <div className="min-w-max">
          <div className="text-xs text-slate-500 mb-1">Original</div>
          <div className="flex">
            {Array.from({length: len}).map((_, i) => {
              const c = orig[i] || '·';
              const isMut = i < orig.length && i < mut.length && orig[i] !== mut[i];
              const isExtra = i >= mut.length && i < orig.length;
              const cls = `base-cell base-${c} ${isMut ? 'mismatch' : isExtra ? 'mismatch' : c !== '·' ? 'match' : ''}`;
              return <div key={i} className={cls}>{c}</div>;
            })}
          </div>
          <div className="text-xs text-slate-500 mb-1 mt-3">Mutated</div>
          <div className="flex">
            {Array.from({length: len}).map((_, i) => {
              const c = mut[i] || '·';
              const isMut = i < orig.length && i < mut.length && orig[i] !== mut[i];
              const isExtra = i >= orig.length && i < mut.length;
              const cls = `base-cell base-${c} ${isMut ? 'mismatch' : isExtra ? 'mismatch' : c !== '·' ? 'match' : ''}`;
              return <div key={i} className={cls}>{c}</div>;
            })}
          </div>
        </div>
      </div>
    );
  };

  // mutation heatmap data
  const heatmapData = analysis ? (() => {
    const bins = 20;
    const len = Math.min(orig.length, mut.length);
    const data = Array.from({length: bins}, (_, i) => ({ bin: i + 1, mutations: 0 }));
    analysis.mutations.forEach(m => {
      const b = Math.floor((m.position / len) * bins);
      data[Math.min(b, bins - 1)].mutations++;
    });
    return data;
  })() : [];

  return (
    <div className="pt-28 pb-20 min-h-screen relative bg-grid">
      <div className="absolute top-40 left-20 w-96 h-96 bg-rose-500/10 blur-[100px] rounded-full"/>
      <div className="relative max-w-7xl mx-auto px-4 sm:px-6">
        <SectionTitle eyebrow="Comparison" title="Mutation Detection" subtitle="Spot base substitutions, deletions and insertions between an original and mutated DNA strand."/>

        <div className="grid md:grid-cols-2 gap-5 mb-6">
          <div className="glass p-5 rounded-2xl">
            <DNAInput label="Original DNA" value={orig} onChange={setOrig} rows={3}/>
          </div>
          <div className="glass p-5 rounded-2xl">
            <DNAInput label="Mutated DNA" value={mut} onChange={setMut} rows={3}/>
          </div>
        </div>

        <button onClick={runAnalysis} className="btn-primary px-6 py-3 rounded-xl font-semibold mb-8">
          🧬 Detect Mutations
        </button>

        {analysis && (
          <Motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="space-y-6">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              <StatCard label="Mutations" value={analysis.mutations.length} color="purple"/>
              <StatCard label="Similarity" value={analysis.similarity.toFixed(1) + '%'}/>
              <StatCard label="Length Diff" value={analysis.lengthDiff}/>
              <StatCard label="Compared" value={analysis.comparedLength + ' bp'}/>
            </div>

            <div className="glass p-6 rounded-2xl">
              <h3 className="font-semibold mb-4">Aligned View</h3>
              <div className="bg-slate-950/60 p-4 rounded-xl border border-slate-800/50">
                {renderAligned()}
              </div>
            </div>

            <div className="grid lg:grid-cols-2 gap-6">
              <div className="glass p-6 rounded-2xl">
                <h3 className="font-semibold mb-3">Mutation List</h3>
                {analysis.mutations.length === 0 ? (
                  <div className="text-emerald-400 text-sm">✓ No mutations detected — sequences are identical in the compared region.</div>
                ) : (
                  <div className="max-h-72 overflow-auto space-y-1.5">
                    {analysis.mutations.map((m, i) => (
                      <div key={i} className="flex items-center justify-between text-sm font-mono bg-slate-950/50 rounded-lg px-3 py-2 border border-slate-800/50">
                        <span className="text-slate-500">pos {m.position}</span>
                        <span className="flex items-center gap-2">
                          <span className={`base-${m.from} font-bold`}>{m.from}</span>
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-slate-500"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                          <span className={`base-${m.to} font-bold`}>{m.to}</span>
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div className="glass p-6 rounded-2xl">
                <h3 className="font-semibold mb-3">Mutation Density Heatmap</h3>
                <ResponsiveContainer width="100%" height={220}>
                  <AreaChart data={heatmapData}>
                    <defs>
                      <linearGradient id="heat" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#f87171" stopOpacity={0.8}/>
                        <stop offset="100%" stopColor="#f87171" stopOpacity={0}/>
                      </linearGradient>
                    </defs>
                    <CartesianGrid stroke="#1e293b" strokeDasharray="3 3"/>
                    <XAxis dataKey="bin" stroke="#64748b"/>
                    <YAxis stroke="#64748b"/>
                    <Tooltip contentStyle={{ background: '#0f172a', border: '1px solid #1e293b', borderRadius: 8 }}/>
                    <Area type="monotone" dataKey="mutations" stroke="#f87171" fill="url(#heat)"/>
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>
          </Motion.div>
        )}
      </div>
    </div>
  );
};

      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
